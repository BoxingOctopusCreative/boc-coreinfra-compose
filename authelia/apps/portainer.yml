- client_id: portainer
  client_name: Portainer
  client_secret: {{ secret "/config/secrets/portainer_oidc_secret" | msquote }}
  public: false
  authorization_policy: two_factor
  redirect_uris:
    - https://portainer.boxingoctopus.io/
  scopes:
    - openid
    - profile
    - email
    - groups
  grant_types:
    - authorization_code
  response_types:
    - code
  token_endpoint_auth_method: client_secret_post