- client_id: wud
  client_name: What's Up Docker
  client_secret: {{ secret "/config/secrets/wud_oidc_secret" | msquote }}
  public: false
  authorization_policy: two_factor
  redirect_uris:
    - https://wud.boxingoctopus.io/auth/oidc/authelia/cb
  scopes:
    - openid
    - profile
    - email
    - groups
  grant_types:
    - authorization_code
  response_types:
    - code
  token_endpoint_auth_method: client_secret_basic