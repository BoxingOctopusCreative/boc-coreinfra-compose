server:
  address: tcp://0.0.0.0:9091

log:
  level: warn

theme: dark

totp:
  issuer: boxingoctopus.io
  period: 30
  skew: 1

identity_validation:
  reset_password:
    jwt_secret: {{ secret "/config/secrets/jwt_secret" | msquote }}

authentication_backend:
  file:
    path: /config/users/users_database.yml
    password:
      algorithm: argon2id
      iterations: 1
      salt_length: 16
      parallelism: 8
      memory: 64

access_control:
  default_policy: deny
  rules:
    - domain: auth.boxingoctopus.io
      policy: bypass
    - domain: traefik.boxingoctopus.io
      policy: two_factor
    - domain: wud.boxingoctopus.io
      policy: bypass

session:
  name: authelia_session
  expiration: 3600
  inactivity: 300
  cookies:
    - domain: boxingoctopus.io
      authelia_url: https://auth.boxingoctopus.io
      default_redirection_url: https://traefik.boxingoctopus.io

storage:
  encryption_key: {{ secret "/config/secrets/storage_encryption_key" | msquote }}
  local:
    path: /config/database/db.sqlite3

notifier:
  smtp:
    address: smtp://smtp.mailgun.org:587
    username: authelia@mg.boxingoctopus.io
    password: {{ secret "/config/secrets/smtp_password" | msquote }}
    sender: authelia@mg.boxingoctopus.io
    subject: "[Authelia] {title}"
    tls:
      server_name: smtp.mailgun.org
      skip_verify: false
      minimum_version: TLS1.2

identity_providers:
  oidc:
    hmac_secret: {{ secret "/config/secrets/oidc_hmac_secret" | msquote }}
    jwks:
      - key: {{ secret "/config/secrets/oidc_private_key" | mindent 10 "|" | msquote }}
    lifespans:
      access_token: 1h
      authorize_code: 1m
      id_token: 1h
      refresh_token: 90m
    clients:
      - client_id: wud
        client_name: What's Up Docker
        client_secret: {{ secret "/config/secrets/wud_oidc_secret" | msquote }}
        public: false
        authorization_policy: two_factor
        redirect_uris:
          - https://wud.boxingoctopus.io/auth/oidc/authelia/cb
        scopes:
          - openid
          - profile
          - email
          - groups
        grant_types:
          - refresh_token
          - authorization_code
        response_types:
          - code
        token_endpoint_auth_method: client_secret_basic