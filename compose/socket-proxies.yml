---
x-socket-proxy-base: &socket-proxy-base
  image: linuxserver/socket-proxy:latest
  restart: unless-stopped
  expose: 
    - 2375
  tmpfs:
    - /run
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
  deploy:
    resources:
      limits:
        cpus: '0.25'
        memory: 64M
      reservations:
        cpus: '0.10'
        memory: 32M
  healthcheck:
    test: nc -vvz localhost 2375
    interval: 10s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  socket-proxy-readonly:
    <<: *socket-proxy-base
    container_name: socket-proxy-readonly
    read_only: true
    environment:
      CONTAINERS: 1
      IMAGES: 1
      DISTRIBUTION: 1
      EVENTS: 1
      INFO: 1
    networks:
      - socket-proxy-readonly

  socket-proxy-portainer:
    <<: *socket-proxy-base
    container_name: socket-proxy-portainer
    environment:
      CONTAINERS: 1
      IMAGES: 1
      DISTRIBUTION: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
      EXEC: 1
      POST: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 1
    networks:
      - socket-proxy-portainer

networks:
  socket-proxy-readonly:
    external: true
  socket-proxy-portainer:
    external: true
  shared-network:
    name: shared-network
    external: true