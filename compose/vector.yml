---
services:
  vector:
    image: timberio/vector:0.49.0-debian
    container_name: vector
    restart: unless-stopped
    environment:
      AXIOM_TOKEN: ${AXIOM_TOKEN}
      AXIOM_DATASET: ${AXIOM_DATASET}
      # AXIOM_ORG_ID: ${AXIOM_ORG_ID}   # only needed if a personal token complains
    volumes:
      - /var/log:/var/log/host:ro
      - vector_data:/var/lib/vector
    configs:
      - source: vector_config
        target: /etc/vector/vector.yaml
    command: ["--config", "/etc/vector/vector.yaml"]
    networks:
      - socket-proxy-portainer
      - default
    labels:
      - wud.watch=true
      - wud.tag.include=^\d+\.\d+\.\d+$      # only track real semver tags
      - wud.trigger.include=docker.autoupdate

volumes:
  vector_data:

networks:
  socket-proxy-portainer:
    external: true

configs:
  vector_config:
    content: |
      data_dir: /var/lib/vector

      sources:
        docker:
          type: docker_logs
          docker_host: tcp://socket-proxy-portainer:2375   # <-- proxy service name + port
          exclude_containers:
            - vector

        host_syslog:
          type: file
          include:
            - /var/log/host/syslog
            - /var/log/host/auth.log
          read_from: end

      transforms:
        enrich:
          type: remap
          inputs:
            - docker
            - host_syslog
          source: |
            .host = get_hostname!()
            if exists(.container_name) {
              .log_source = "container"
            } else {
              .log_source = "host"
            }

      sinks:
        axiom:
          type: axiom
          inputs: [enrich]
          token: "${AXIOM_TOKEN}"
          dataset: "${AXIOM_DATASET}"
          # org_id: "${AXIOM_ORG_ID}"