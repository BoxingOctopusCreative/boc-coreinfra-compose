---
services:
  vector:
    image: timberio/vector:0.49.0-alpine
    container_name: vector
    restart: unless-stopped
    environment:
      VECTOR_LOG: debug
      AXIOM_TOKEN: ${AXIOM_TOKEN}
      AXIOM_DATASET: portainer
      AXIOM_ORG_ID: boc-engineering-vvyp
    volumes:
      - /var/log:/var/log/host:ro
      - vector_data:/var/lib/vector
    configs:
      - source: vector_config
        target: /etc/vector/vector.yaml
    command: ["--config", "/etc/vector/vector.yaml"]
    networks:
      - socket-proxy-readonly
      - default
    labels:
      wud.watch: true
      wud.tag.include: "^\\d+\\.\\d+\\.\\d+$"      # only track real semver tags
      wud.trigger.include: "docker.autoupdate"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8686/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vector_data:

networks:
  socket-proxy-readonly:
    external: true

configs:
  vector_config:
    content: |
      data_dir: /var/lib/vector

      api:
        enabled: true
        address: 0.0.0.0:8686

      sources:
        docker:
          type: docker_logs
          docker_host: http://socket-proxy-readonly:2375   # <-- proxy service name + port
          exclude_containers:
            - vector

        host_syslog:
          type: file
          include:
            - /var/log/host/syslog
            - /var/log/host/auth.log
          read_from: end

      transforms:
        enrich:
          type: remap
          inputs:
            - docker
            - host_syslog
          source: |
            .host = get_hostname!()
            if exists(.container_name) {
              .log_source = "container"
            } else {
              .log_source = "host"
            }

      sinks:
        axiom:
          type: axiom
          inputs: [enrich]
          token: "${AXIOM_TOKEN}"
          dataset: "${AXIOM_DATASET}"
          # org_id: "${AXIOM_ORG_ID}"